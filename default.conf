server {
    listen 80;
    server_name agy.orchable.xyz;

    location / {
        # Protected via X-Bridge-Secret header in the Node app itself for easier API integration
        proxy_pass http://172.18.0.1:3999;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Set higher timeouts since agent tasks can take time
        proxy_read_timeout 600s;
        proxy_connect_timeout 600s;
    }
}
